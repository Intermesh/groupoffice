description:
  en:
    localisedName: GroupOffice
    shortDescription: "GroupOffice is an open-source groupware and CRM platform for
      enterprises and the public sector. "
    longDescription: >-
      GroupOffice is an open-source groupware and CRM platform for enterprises
      and the public sector. It’s created and maintained by the Dutch company
      Intermesh. You can self-host the software or run it on Intermesh’s secure
      cloud infrastructure, where your data remains fully private.


      Collaborate with integrated file sharing, video conferencing, E-mail,
      calendar and contact management, project and time tracking, quoting and
      invoicing, support ticketing, and the Collabora Online office suite. By
      combining all these tools in a single platform, GroupOffice eliminates the
      need for multiple separate systems and streamlines your workflow.

      GroupOffice is easily extensible with custom modules, allowing you to
      tailor the platform to your specific needs.
    documentation: https://groupoffice.readthedocs.io/en/latest/
